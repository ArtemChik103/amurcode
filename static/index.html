<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Конструктор аналитических выборок</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Конструктор аналитических выборок</h1>
        <p>РЧБ, соглашения, госзаказ и БУ/АУ в одной витрине</p>
      </div>
      <button id="exportCsv" class="icon-button" title="Экспортировать таблицу в CSV" aria-label="Экспорт CSV">
        <span aria-hidden="true">⇩</span>
        CSV
      </button>
    </header>

    <main>
      <section class="status" aria-label="Статус загрузки">
        <span id="loadStatus">Загрузка данных...</span>
        <span id="qualityStatus"></span>
      </section>

      <section class="modebar" aria-label="Режим">
        <button id="sliceMode" class="active" type="button">Срез</button>
        <button id="compareMode" type="button">Сравнение</button>
      </section>

      <section class="filters" aria-label="Фильтры">
        <label>
          <span>Поиск</span>
          <input id="q" type="search" placeholder="объект, бюджет, получатель, номер" />
        </label>
        <label>
          <span>Код</span>
          <input id="code" type="search" placeholder="970, 6105, КЦСР" />
        </label>
        <label>
          <span>Шаблон</span>
          <select id="template"></select>
        </label>
        <label>
          <span>Бюджет</span>
          <select id="budget"></select>
        </label>
        <label>
          <span>Источник</span>
          <select id="source"></select>
        </label>
        <label class="slice-only">
          <span>С</span>
          <input id="start" type="date" />
        </label>
        <label class="slice-only">
          <span>По</span>
          <input id="end" type="date" />
        </label>
        <label class="compare-only hidden">
          <span>База</span>
          <select id="baseDate"></select>
        </label>
        <label class="compare-only hidden">
          <span>Цель</span>
          <select id="targetDate"></select>
        </label>
        <button id="reset" class="secondary" type="button" title="Сбросить фильтры" aria-label="Сбросить">↺</button>
      </section>

      <section class="metric-filter" aria-label="Метрики" id="metricFilter"></section>

      <section class="kpis" aria-label="Показатели" id="kpis"></section>

      <section class="workspace">
        <div class="panel chart-panel slice-panel">
          <div class="panel-head">
            <h2 id="resultTitle">Динамика</h2>
            <span id="recordCount"></span>
          </div>
          <canvas id="chart" height="260"></canvas>
        </div>

        <div class="panel slice-panel">
          <div class="panel-head">
            <h2>Сводная таблица</h2>
            <span id="rowCount"></span>
          </div>
          <div class="table-wrap">
            <table id="summaryTable">
              <thead id="summaryHead"></thead>
              <tbody id="summaryBody"></tbody>
            </table>
          </div>
        </div>

        <div class="panel compare-panel hidden">
          <div class="panel-head">
            <h2>Сравнение периодов</h2>
            <span id="compareCount"></span>
          </div>
          <div class="table-wrap">
            <table id="compareTable">
              <thead id="compareHead"></thead>
              <tbody id="compareBody"></tbody>
            </table>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2>Детализация</h2>
            <span id="detailCount"></span>
          </div>
          <div class="table-wrap compact">
            <table>
              <thead>
                <tr>
                  <th>Дата</th>
                  <th>Источник</th>
                  <th>Код</th>
                  <th>Объект</th>
                  <th>Документ</th>
                  <th>Контрагент</th>
                  <th class="number">Сумма</th>
                  <th>Trace</th>
                </tr>
              </thead>
              <tbody id="detailBody"></tbody>
            </table>
          </div>
        </div>
      </section>
    </main>

    <dialog id="traceDialog">
      <div class="dialog-head">
        <h2>Исходная строка</h2>
        <button id="closeTrace" type="button" aria-label="Закрыть">×</button>
      </div>
      <pre id="traceBody"></pre>
    </dialog>

    <script src="/static/app.js"></script>
  </body>
</html>
