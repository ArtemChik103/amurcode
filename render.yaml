services:
  - type: web
    name: expense-analytics
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: ASSISTANT_ENABLED
        value: auto
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
